<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bookmark Tools{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <nav class="container-fluid">
    <ul>
      <li><strong>Bookmark Tools</strong></li>
    </ul>
    <ul>
      <li><a href="/" {% if request.path == '/' %}aria-current="page"{% endif %}>Browse</a></li>
      <li><a href="/search" {% if request.path == '/search' %}aria-current="page"{% endif %}>Search</a></li>
      <li><a href="/stats" {% if request.path == '/stats' %}aria-current="page"{% endif %}>Stats</a></li>
    </ul>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
